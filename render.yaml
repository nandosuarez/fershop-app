services:
  - type: web
    name: fershop-app
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FERSHOP_HOST
        value: 0.0.0.0
      - key: FERSHOP_DB_PATH
        value: /var/data/fershop_app.sqlite3
      - key: FERSHOP_DEFAULT_ADMIN_PASSWORD
        sync: false
    disk:
      name: fershop-data
      mountPath: /var/data
      sizeGB: 5
